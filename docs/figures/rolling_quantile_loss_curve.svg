  <line class="grid" x1="90" y1="287.3" x2="910" y2="287.3"/>
  <line class="grid" x1="90" y1="358.2" x2="910" y2="358.2"/>
  <line class="grid" x1="90" y1="429.1" x2="910" y2="429.1"/>
  <line class="grid" x1="90" y1="500" x2="910" y2="500"/>

  <line class="grid" x1="90" y1="120" x2="90" y2="500"/>
  <line class="grid" x1="220.9" y1="120" x2="220.9" y2="500"/>
  <line class="grid" x1="358.7" y1="120" x2="358.7" y2="500"/>
  <line class="grid" x1="496.4" y1="120" x2="496.4" y2="500"/>
  <line class="grid" x1="634.1" y1="120" x2="634.1" y2="500"/>
