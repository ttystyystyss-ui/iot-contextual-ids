    393.1,477.0 427.5,479.5 462.0,478.7 496.4,479.3 530.8,480.1
    565.3,480.3 599.7,483.5 634.1,482.4 668.6,484.2 703.0,483.6
    737.4,481.8 771.9,485.8 806.3,484.5 840.8,487.5 875.2,487.0
    910.0,487.4"/>

  <polyline class="val" points="
    90,163.0 96.9,215.3 103.8,387.7 110.7,403.5 117.6,413.7
    124.5,422.9 131.3,436.5 138.2,438.0 152.0,442.5 186.5,444.8
    220.9,450.4 255.3,457.9 289.8,461.9 324.2,467.5 358.7,466.4
    393.1,466.4 427.5,469.3 462.0,470.7 496.4,468.7 530.8,470.6
    565.3,468.9 599.7,471.4 634.1,471.8 668.6,472.1 703.0,469.8
    737.4,472.6 771.9,473.0 806.3,472.9 840.8,473.4 875.2,476.0
    910.0,474.2"/>

  <circle class="marker" cx="875.2" cy="476.0" r="5"/>
  <line x1="875.2" y1="476.0" x2="875.2" y2="118" stroke="#e21c2d" stroke-width="1.5" stroke-dasharray="6 6"/>
  <text class="note" x="730" y="134">best val loss: 0.01338 @ epoch 115</text>

  <rect class="box" x="684" y="170" width="184" height="72"/>
  <line class="train" x1="706" y1="194" x2="754" y2="194"/>
  <text class="legendText" x="768" y="199">train_loss</text>
  <line class="val" x1="706" y1="220" x2="754" y2="220"/>
  <text class="legendText" x="768" y="225">val_loss</text>

  <text class="subtitle" x="500" y="596" text-anchor="middle">Final: train 0.01177, val 0.01363. Curves plateau after roughly 40 epochs.</text>
</svg>
