<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f8fafc}.page{fill:#fff;stroke:#102a63;stroke-width:2.2;rx:18}.panel{fill:#fff;stroke:#244f9e;stroke-width:1.7;rx:14}.greenPanel{fill:#fbfffc;stroke:#1f7a35;stroke-width:1.7;rx:14}.purplePanel{fill:#fffaff;stroke:#6038b8;stroke-width:1.7;rx:14}
      .title{font-family:Arial,Helvetica,sans-serif;font-size:40px;font-weight:800;fill:#102a63}.sub{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#52617a}
      .h{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:800;fill:#102a63}.hg{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:800;fill:#136626}.t{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#17233d}.s{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#52617a}.m{font-family:"Courier New",monospace;font-size:13px;fill:#17233d}
      .boxB{fill:#f1f6ff;stroke:#2864c8;stroke-width:1.5;rx:9}.boxO{fill:#fff7ed;stroke:#e17a18;stroke-width:1.5;rx:9}.boxG{fill:#eefaf0;stroke:#207a34;stroke-width:1.5;rx:9}.boxP{fill:#f5efff;stroke:#6038b8;stroke-width:1.5;rx:9}.boxR{fill:#fff3f3;stroke:#d21e22;stroke-width:1.5;rx:9}
      .node{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:800;fill:#102a63}.head{fill:#102a63}.headText{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:800;fill:#fff}.line{stroke:#9fb0cf;stroke-width:1}
      .arr{fill:none;stroke:#102a63;stroke-width:3;marker-end:url(#a)}.arrG{fill:none;stroke:#207a34;stroke-width:3;marker-end:url(#ag)}.arrR{fill:none;stroke:#d21e22;stroke-width:3;marker-end:url(#ar)}.edge{fill:none;stroke:#111;stroke-width:2;marker-end:url(#ab)}.dash{stroke-dasharray:6 6}
      .chip{fill:#fff;stroke:#244f9e;stroke-width:1.1;rx:5}.chipT{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:800;fill:#102a63}
    </style>
    <marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#102a63"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#207a34"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#d21e22"/></marker>
    <marker id="ab" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#111"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/><rect class="page" x="16" y="16" width="1568" height="868"/>
  <text class="title" x="800" y="65" text-anchor="middle">Rolling Quantile GAT-GRU Contextual IDS</text>
  <text class="sub" x="800" y="96" text-anchor="middle">Compact vector summary of delay basis, target construction, model architecture, and online detection</text>

  <rect class="panel" x="42" y="126" width="500" height="318"/><text class="h" x="70" y="164">1. Delay Basis</text>
  <rect x="70" y="188" width="442" height="178" fill="#fff" stroke="#244f9e" stroke-width="1.2" rx="8"/>
  <rect class="head" x="70" y="188" width="442" height="31"/><text class="headText" x="92" y="209">Relation</text><text class="headText" x="288" y="209">P90</text><text class="headText" x="378" y="209">Safe window</text>
  <line class="line" x1="260" y1="188" x2="260" y2="366"/><line class="line" x1="340" y1="188" x2="340" y2="366"/>
  <line class="line" x1="70" y1="249" x2="512" y2="249"/><line class="line" x1="70" y1="284" x2="512" y2="284"/><line class="line" x1="70" y1="319" x2="512" y2="319"/>
  <text class="t" x="88" y="240">light_state -> ambient_light</text><text class="t" x="280" y="240">1.009s</text><text class="t" x="380" y="240">3s</text>
  <text class="t" x="88" y="275">light_state -> total_power_w</text><text class="t" x="280" y="275">3.004s</text><text class="t" x="380" y="275">5s</text>
  <text class="t" x="88" y="310">fan_state -> total_power_w</text><text class="t" x="280" y="310">3.003s</text><text class="t" x="380" y="310">5s</text>
  <text class="t" x="88" y="345">fan_state -> temperature</text><text class="t" x="280" y="345">42.45s</text><text class="t" x="362" y="345">future work</text>
  <text class="s" x="70" y="402">Delay measurement determines target horizon and transition filtering.</text>

  <rect class="panel" x="566" y="126" width="500" height="318"/><text class="h" x="594" y="164">2. Data and Target Processing</text>
  <rect x="596" y="188" width="212" height="164" fill="#fff" stroke="#244f9e" stroke-width="1.2" rx="8"/>
  <rect class="head" x="596" y="188" width="212" height="31"/><text class="headText" x="616" y="209">MQTT</text><text class="headText" x="700" y="209">Aligned CSV</text>
  <line class="line" x1="682" y1="188" x2="682" y2="352"/><line class="line" x1="596" y1="248" x2="808" y2="248"/><line class="line" x1="596" y1="283" x2="808" y2="283"/><line class="line" x1="596" y1="318" x2="808" y2="318"/>
  <text class="t" x="616" y="239" fill="#d56600">Arduino</text><text class="t" x="696" y="239">ambient_light</text>
  <text class="t" x="616" y="274" fill="#136626">Hue</text><text class="t" x="696" y="274">light_state</text>
  <text class="t" x="616" y="309" fill="#1f4ed8">Dreo</text><text class="t" x="696" y="309">fan_state</text>
  <text class="t" x="616" y="344" fill="#6038b8">Tapo</text><text class="t" x="696" y="344">total_power_w</text>
  <line x1="848" y1="232" x2="1014" y2="232" stroke="#2864c8" stroke-width="2"/><line x1="848" y1="292" x2="1014" y2="292" stroke="#207a34" stroke-width="2"/>
  <text class="s" x="848" y="206">Past 10s input window</text><text class="s" x="894" y="256">t-9 ... t</text>
  <text class="s" x="852" y="326">Future 5s horizon</text><text class="s" x="886" y="348">t+1 ... t+5</text>
  <rect class="boxB" x="600" y="382" width="210" height="42"/><text class="m" x="705" y="408" text-anchor="middle">target = median(t+3,t+4,t+5) - current</text>
  <rect class="boxO" x="830" y="382" width="206" height="42"/><text class="m" x="933" y="408" text-anchor="middle">skip if future state transition</text>

  <rect class="panel" x="1090" y="126" width="468" height="318"/><text class="h" x="1118" y="164">3. Model Architecture</text>
  <circle cx="1150" cy="235" r="25" fill="#c9f2ce" stroke="#207a34" stroke-width="2"/><text class="node" x="1150" y="243" text-anchor="middle">L</text>
  <circle cx="1150" cy="318" r="25" fill="#cfe0ff" stroke="#2864c8" stroke-width="2"/><text class="node" x="1150" y="326" text-anchor="middle">F</text>
  <circle cx="1270" cy="235" r="25" fill="#ffd9b8" stroke="#e17a18" stroke-width="2"/><text class="node" x="1270" y="243" text-anchor="middle">A</text>
  <circle cx="1270" cy="318" r="25" fill="#decfff" stroke="#6038b8" stroke-width="2"/><text class="node" x="1270" y="326" text-anchor="middle">P</text>
  <path class="edge" d="M1175 235 L1245 235"/><path class="edge" d="M1170 255 L1250 298"/><path class="edge" d="M1175 318 L1245 318"/>
  <path class="edge dash" d="M1126 235 C1108 218 1108 202 1128 199"/><path class="edge dash" d="M1296 235 C1314 218 1314 202 1294 199"/>
  <text class="s" x="1117" y="367">L light, F fan, A ambient, P power</text>
  <path class="arr" d="M1340 276 L1374 276"/>
  <rect class="boxB" x="1374" y="202" width="72" height="148"/><text class="t" x="1410" y="235" text-anchor="middle">Input</text><text class="s" x="1410" y="260" text-anchor="middle">10 x 4</text><text class="s" x="1410" y="282" text-anchor="middle">nodes</text>
  <path class="arr" d="M1446 276 L1474 276"/>
  <rect class="boxO" x="1474" y="202" width="64" height="148"/><text class="t" x="1506" y="248" text-anchor="middle">GAT</text><text class="s" x="1506" y="274" text-anchor="middle">GRU</text><text class="s" x="1506" y="300" text-anchor="middle">Q head</text>
  <text class="s" x="1374" y="394">Rolling context is concatenated before quantile prediction.</text>

  <rect class="greenPanel" x="42" y="474" width="1516" height="286"/><text class="hg" x="70" y="512">4. Online Detection</text>
  <rect class="boxG" x="90" y="550" width="220" height="82"/><text class="t" x="200" y="580" text-anchor="middle" font-weight="800">Build 10s Context</text><text class="s" x="200" y="606" text-anchor="middle">stream 1s MQTT telemetry</text>
  <path class="arrG" d="M310 591 L370 591"/><rect class="boxG" x="370" y="550" width="220" height="82"/><text class="t" x="480" y="580" text-anchor="middle" font-weight="800">Predict Interval</text><text class="s" x="480" y="606" text-anchor="middle">P10 / P50 / P90 per response</text>
  <path class="arrG" d="M590 591 L650 591"/><rect class="boxG" x="650" y="550" width="260" height="82"/><text class="t" x="780" y="580" text-anchor="middle" font-weight="800">Compute Actual Response</text><text class="s" x="780" y="606" text-anchor="middle">future median - current</text>
  <path class="arrG" d="M480 632 L480 682 L398 682"/><path class="arrR" d="M780 632 L780 682 L862 682"/>
  <rect class="boxG" x="220" y="682" width="260" height="58"/><text class="t" x="350" y="706" text-anchor="middle" fill="#136626" font-weight="800">Inside P10-P90</text><text class="t" x="350" y="729" text-anchor="middle" fill="#136626">Normal</text>
  <rect class="boxR" x="860" y="682" width="260" height="58"/><text class="t" x="990" y="706" text-anchor="middle" fill="#d21e22" font-weight="800">Outside P10-P90</text><text class="t" x="990" y="729" text-anchor="middle" fill="#d21e22">Anomaly / Alert</text>
  <rect class="purplePanel" x="1190" y="536" width="300" height="188"/><text class="h" x="1220" y="574">Outputs</text>
  <text class="t" x="1220" y="612">ambient_light: P10, P50, P90</text><text class="t" x="1220" y="642">total_power_w: P10, P50, P90</text><text class="s" x="1220" y="678">Temperature is excluded from the current model.</text>
  <text class="sub" x="800" y="830" text-anchor="middle">The compact diagram preserves current code logic: four model nodes, directed edges, rolling context, quantile intervals, and per-variable anomaly decisions.</text>
</svg>
