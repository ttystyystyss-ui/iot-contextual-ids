<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <style>
      .page{fill:#fff;stroke:#0b2b6f;stroke-width:2.4;rx:14}
      .panel{fill:#fff;stroke:#17449d;stroke-width:1.8;rx:10}
      .greenPanel{fill:#fff;stroke:#1d7a34;stroke-width:1.8;rx:10}
      .title{font-family:Arial,Helvetica,sans-serif;font-size:42px;font-weight:800;fill:#0b2b6f}
      .h{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:800;fill:#0b2b6f}
      .hg{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:800;fill:#117025}
      .t{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#111827}
      .s{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#374151}
      .tiny{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#374151}
      .mono{font-family:"Courier New",monospace;font-size:13px;fill:#0b2b6f}
      .badge{fill:#0b2b6f;rx:7}.badgeText{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:800;fill:white}
      .head{fill:#0b2b6f}.headText{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:800;fill:white}
      .grid{stroke:#7f93c7;stroke-width:1}.boxB{fill:#f8fbff;stroke:#1f55bd;stroke-width:1.5;rx:8}
      .boxO{fill:#fffaf4;stroke:#f06c00;stroke-width:1.5;rx:8}.boxG{fill:#fbfffc;stroke:#1d7a34;stroke-width:1.5;rx:8}
      .boxP{fill:#fbf8ff;stroke:#6b39c8;stroke-width:1.5;rx:8}.boxR{fill:#fffafa;stroke:#df1f26;stroke-width:1.5;rx:8}
      .arrow{fill:none;stroke:#0b2b6f;stroke-width:3;marker-end:url(#arrow)}
      .arrowG{fill:none;stroke:#1d7a34;stroke-width:3;marker-end:url(#arrowG)}
      .arrowR{fill:none;stroke:#df1f26;stroke-width:3;marker-end:url(#arrowR)}
      .edge{fill:none;stroke:#111;stroke-width:2;marker-end:url(#arrowBlack)}
      .loop{fill:none;stroke:#111;stroke-width:1.7;stroke-dasharray:6 5;marker-end:url(#arrowBlack)}
      .nodeText{font-family:Arial,Helvetica,sans-serif;font-size:26px;font-weight:800;fill:#0b2b6f}
      .chip{fill:#fff;stroke-width:1.3;rx:5}.chipO{stroke:#f06c00}.chipP{stroke:#6b39c8}
      .chipText{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:800;fill:#111827}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#0b2b6f"/></marker>
    <marker id="arrowG" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#1d7a34"/></marker>
    <marker id="arrowR" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#df1f26"/></marker>
    <marker id="arrowBlack" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#111"/></marker>
  </defs>

  <rect class="page" x="8" y="8" width="1784" height="964"/>
  <text class="title" x="900" y="58" text-anchor="middle">Rolling Quantile GAT-GRU Contextual IDS</text>

  <!-- 1. Delay basis -->
  <rect class="panel" x="22" y="86" width="850" height="238"/>
  <rect class="badge" x="36" y="104" width="36" height="34"/><text class="badgeText" x="54" y="129" text-anchor="middle">1</text>
  <text class="h" x="92" y="130">Measured Delay Basis</text>
  <rect x="38" y="156" width="818" height="130" fill="#fff" stroke="#17449d" stroke-width="1.1" rx="6"/>
  <rect class="head" x="38" y="156" width="818" height="30"/>
  <text class="headText" x="145" y="176" text-anchor="middle">Relation</text>
  <text class="headText" x="350" y="176" text-anchor="middle">Median</text>
  <text class="headText" x="500" y="176" text-anchor="middle">P90</text>
  <text class="headText" x="650" y="176" text-anchor="middle">Max</text>
  <text class="headText" x="772" y="176" text-anchor="middle">Safe window</text>
  <line class="grid" x1="282" y1="156" x2="282" y2="286"/><line class="grid" x1="425" y1="156" x2="425" y2="286"/><line class="grid" x1="575" y1="156" x2="575" y2="286"/><line class="grid" x1="725" y1="156" x2="725" y2="286"/>
  <line class="grid" x1="38" y1="218" x2="856" y2="218"/><line class="grid" x1="38" y1="252" x2="856" y2="252"/>
  <text class="t" x="58" y="210">light_state -> ambient_light</text><text class="t" x="350" y="210" text-anchor="middle">0s</text><text class="t" x="500" y="210" text-anchor="middle">1.009s</text><text class="t" x="650" y="210" text-anchor="middle">2.002s</text><text class="t" x="772" y="210" text-anchor="middle">3s</text>
  <text class="t" x="58" y="244">light_state -> total_power_w</text><text class="t" x="350" y="244" text-anchor="middle">2.002s</text><text class="t" x="500" y="244" text-anchor="middle">3.004s</text><text class="t" x="650" y="244" text-anchor="middle">4.004s</text><text class="t" x="772" y="244" text-anchor="middle">5s</text>
  <text class="t" x="58" y="278">fan_state -> total_power_w</text><text class="t" x="350" y="278" text-anchor="middle">2.001s</text><text class="t" x="500" y="278" text-anchor="middle">3.003s</text><text class="t" x="650" y="278" text-anchor="middle">3.026s</text><text class="t" x="772" y="278" text-anchor="middle">5s</text>
  <text class="s" x="46" y="308">Temperature response is delayed by about 60s, so it is kept as future work rather than a current model node.</text>

  <!-- 2. Data and target -->
  <rect class="panel" x="898" y="86" width="880" height="238"/>
  <rect class="badge" x="912" y="104" width="36" height="34"/><text class="badgeText" x="930" y="129" text-anchor="middle">2</text>
  <text class="h" x="968" y="130">Data and Target Processing</text>
  <rect x="922" y="156" width="300" height="132" fill="#fff" stroke="#17449d" stroke-width="1.1" rx="6"/>
  <rect class="head" x="922" y="156" width="300" height="30"/>
  <text class="headText" x="976" y="176" text-anchor="middle">MQTT Topic</text><text class="headText" x="1112" y="176" text-anchor="middle">Aligned 1s CSV Inputs</text>
  <line class="grid" x1="1028" y1="156" x2="1028" y2="288"/>
  <line class="grid" x1="922" y1="218" x2="1222" y2="218"/><line class="grid" x1="922" y1="253" x2="1222" y2="253"/>
  <text class="t" x="976" y="210" text-anchor="middle" fill="#f06c00">Arduino</text><text class="s" x="1046" y="210">ambient_light raw inverse ADC</text>
  <text class="t" x="976" y="244" text-anchor="middle" fill="#117025">Hue</text><text class="s" x="1046" y="244">light_state</text>
  <text class="t" x="976" y="278" text-anchor="middle" fill="#1f55bd">Dreo</text><text class="s" x="1046" y="278">fan_state</text>
  <text class="t" x="976" y="306" text-anchor="middle" fill="#6b39c8">Tapo P110</text><text class="s" x="1046" y="306">total_power_w</text>
  <text class="s" x="1295" y="158" text-anchor="middle" fill="#1f55bd">Past 10s Input Window</text>
  <line x1="1270" y1="184" x2="1546" y2="184" stroke="#1f55bd" stroke-width="2"/>
  <text class="s" x="1270" y="216" text-anchor="middle">t-9</text><text class="s" x="1310" y="216" text-anchor="middle">t-8</text><text class="s" x="1350" y="216" text-anchor="middle">t-7</text><text class="s" x="1390" y="216" text-anchor="middle">...</text><text class="s" x="1504" y="216" text-anchor="middle">t-1</text><text class="s" x="1546" y="216" text-anchor="middle">t</text>
  <circle cx="1270" cy="184" r="9" fill="#fff" stroke="#1f55bd" stroke-width="2"/><circle cx="1310" cy="184" r="9" fill="#fff" stroke="#1f55bd" stroke-width="2"/><circle cx="1350" cy="184" r="9" fill="#fff" stroke="#1f55bd" stroke-width="2"/><circle cx="1390" cy="184" r="9" fill="#fff" stroke="#1f55bd" stroke-width="2"/><circle cx="1430" cy="184" r="9" fill="#fff" stroke="#1f55bd" stroke-width="2"/><circle cx="1470" cy="184" r="9" fill="#fff" stroke="#1f55bd" stroke-width="2"/><circle cx="1504" cy="184" r="9" fill="#fff" stroke="#1f55bd" stroke-width="2"/><circle cx="1546" cy="184" r="9" fill="#fff" stroke="#1f55bd" stroke-width="2"/>
  <line x1="1576" y1="150" x2="1576" y2="292" stroke="#374151" stroke-width="1.4" stroke-dasharray="6 6"/>
  <text class="s" x="1660" y="158" text-anchor="middle" fill="#117025">Future 5s Horizon</text>
  <line x1="1600" y1="184" x2="1748" y2="184" stroke="#117025" stroke-width="2"/><path d="M1748 184 L1765 184" class="arrow"/>
  <circle cx="1600" cy="184" r="9" fill="#fff" stroke="#117025" stroke-width="2"/><circle cx="1640" cy="184" r="9" fill="#fff" stroke="#117025" stroke-width="2"/><circle cx="1680" cy="184" r="9" fill="#fff" stroke="#117025" stroke-width="2"/><circle cx="1720" cy="184" r="9" fill="#fff" stroke="#117025" stroke-width="2"/>
  <rect class="boxB" x="1266" y="244" width="290" height="44"/><text class="mono" x="1411" y="272" text-anchor="middle">response = median(t+3,t+4,t+5) - current</text>
  <rect class="boxO" x="1588" y="244" width="158" height="44"/><text class="s" x="1667" y="263" text-anchor="middle" fill="#d95d00">Skip if future 5s</text><text class="s" x="1667" y="281" text-anchor="middle" fill="#d95d00">state transition</text>

  <!-- 3. Model architecture -->
  <rect class="panel" x="22" y="348" width="1756" height="264"/>
  <rect class="badge" x="36" y="366" width="36" height="34"/><text class="badgeText" x="54" y="391" text-anchor="middle">3</text>
  <text class="h" x="92" y="392">Model Architecture</text>
  <circle cx="110" cy="460" r="25" fill="#c9f2ce" stroke="#1d7a34" stroke-width="2"/><text class="nodeText" x="110" y="469" text-anchor="middle">L</text>
  <circle cx="110" cy="546" r="25" fill="#cfe0ff" stroke="#1f55bd" stroke-width="2"/><text class="nodeText" x="110" y="555" text-anchor="middle">F</text>
  <circle cx="254" cy="460" r="25" fill="#ffd9b8" stroke="#f06c00" stroke-width="2"/><text class="nodeText" x="254" y="469" text-anchor="middle">A</text>
  <circle cx="254" cy="546" r="25" fill="#decfff" stroke="#6b39c8" stroke-width="2"/><text class="nodeText" x="254" y="555" text-anchor="middle">P</text>
  <path class="edge" d="M135 460 L229 460"/><path class="edge" d="M130 480 L234 526"/><path class="edge" d="M135 546 L229 546"/>
  <path class="loop" d="M86 460 C62 440 62 420 88 416"/><path class="loop" d="M278 460 C302 440 302 420 276 416"/><path class="loop" d="M86 546 C62 526 62 506 88 502"/><path class="loop" d="M278 546 C302 526 302 506 276 502"/>
  <text class="s" x="72" y="494">light_state</text><text class="s" x="72" y="580">fan_state</text><text class="s" x="214" y="494">ambient_light</text><text class="s" x="214" y="580">total_power_w</text>
  <text class="t" x="68" y="602" fill="#0b2b6f" font-weight="800">Directed edges + self-loops</text>

  <rect class="boxB" x="390" y="420" width="116" height="140"/><text class="t" x="448" y="456" text-anchor="middle" font-weight="800" fill="#0b2b6f">Input</text><text class="t" x="448" y="484" text-anchor="middle">Graphs</text><text class="s" x="448" y="520" text-anchor="middle">10 time steps</text><text class="s" x="448" y="542" text-anchor="middle">4 nodes per step</text>
  <path class="arrow" d="M506 490 L548 490"/>
  <rect class="boxO" x="548" y="420" width="130" height="140"/><text class="t" x="613" y="456" text-anchor="middle" font-weight="800">GAT</text><text class="t" x="613" y="482" text-anchor="middle">Spatial</text><text class="t" x="613" y="508" text-anchor="middle">Attention</text><text class="s" x="613" y="542" text-anchor="middle">edge weights</text>
  <path class="arrow" d="M678 490 L720 490"/>
  <rect class="boxG" x="720" y="420" width="130" height="140"/><text class="t" x="785" y="456" text-anchor="middle" font-weight="800">Flatten</text><text class="t" x="785" y="482" text-anchor="middle">Node</text><text class="t" x="785" y="508" text-anchor="middle">Embeddings</text><text class="s" x="785" y="542" text-anchor="middle">concat nodes</text>
  <path class="arrow" d="M850 490 L892 490"/>
  <rect class="boxB" x="892" y="420" width="130" height="140"/><text class="t" x="957" y="456" text-anchor="middle" font-weight="800" fill="#0b2b6f">GRU</text><text class="t" x="957" y="482" text-anchor="middle" fill="#0b2b6f">Temporal</text><text class="t" x="957" y="508" text-anchor="middle" fill="#0b2b6f">Encoder</text><text class="s" x="957" y="542" text-anchor="middle">10s memory</text>
  <path class="arrow" d="M1022 490 L1064 490"/>
  <rect class="boxP" x="1064" y="420" width="190" height="140"/><text class="t" x="1159" y="454" text-anchor="middle" font-weight="800" fill="#0b2b6f">Rolling Context</text><text class="mono" x="1159" y="480" text-anchor="middle">(last_off_ambient_median)</text><text class="s" x="1159" y="520" text-anchor="middle">ambient_light rolling median</text><text class="s" x="1159" y="542" text-anchor="middle">when light_state = 0</text>
  <path class="arrow" d="M1254 490 L1296 490"/>
  <rect class="boxR" x="1296" y="420" width="130" height="140"/><text class="t" x="1361" y="456" text-anchor="middle" font-weight="800" fill="#df1f26">Quantile</text><text class="t" x="1361" y="482" text-anchor="middle" font-weight="800" fill="#df1f26">Head</text><text class="s" x="1361" y="520" text-anchor="middle">predict P10,</text><text class="s" x="1361" y="542" text-anchor="middle">P50, P90</text>
  <path class="arrow" d="M1426 490 L1468 490"/>
  <rect class="boxB" x="1468" y="420" width="280" height="140"/><text class="t" x="1608" y="452" text-anchor="middle" font-weight="800" fill="#0b2b6f">Outputs</text>
  <rect class="boxO" x="1492" y="478" width="232" height="34"/><text class="s" x="1510" y="500" fill="#d95d00">ambient_light</text><rect class="chip chipO" x="1632" y="484" width="28" height="22"/><text class="chipText" x="1646" y="500" text-anchor="middle">P10</text><rect class="chip chipO" x="1668" y="484" width="28" height="22"/><text class="chipText" x="1682" y="500" text-anchor="middle">P50</text><rect class="chip chipO" x="1704" y="484" width="28" height="22"/><text class="chipText" x="1718" y="500" text-anchor="middle">P90</text>
  <rect class="boxP" x="1492" y="522" width="232" height="34"/><text class="s" x="1510" y="544" fill="#3f1b88">total_power_w</text><rect class="chip chipP" x="1632" y="528" width="28" height="22"/><text class="chipText" x="1646" y="544" text-anchor="middle">P10</text><rect class="chip chipP" x="1668" y="528" width="28" height="22"/><text class="chipText" x="1682" y="544" text-anchor="middle">P50</text><rect class="chip chipP" x="1704" y="528" width="28" height="22"/><text class="chipText" x="1718" y="544" text-anchor="middle">P90</text>
  <text class="s" x="772" y="594" text-anchor="middle"><tspan font-weight="800" fill="#0b2b6f">Note:</tspan> current model excludes temperature node.</text>

  <!-- B. Online detection -->
  <rect class="greenPanel" x="22" y="636" width="700" height="300"/>
  <text class="hg" x="52" y="682">B. Online Detection</text><text class="s" x="260" y="682">(per response variable)</text>
  <rect class="boxG" x="70" y="714" width="150" height="96"/><text class="t" x="145" y="740" text-anchor="middle" font-weight="800" fill="#117025">1. Build 10s</text><text class="t" x="145" y="762" text-anchor="middle" font-weight="800" fill="#117025">context</text><text class="s" x="145" y="788" text-anchor="middle">stream 1s MQTT</text><text class="s" x="145" y="806" text-anchor="middle">wait next second</text>
  <path class="arrowG" d="M220 762 L260 762"/>
  <rect class="boxG" x="260" y="714" width="154" height="96"/><text class="t" x="337" y="740" text-anchor="middle" font-weight="800" fill="#117025">2. Predict</text><text class="t" x="337" y="762" text-anchor="middle" font-weight="800" fill="#117025">P10/P50/P90</text><text class="s" x="337" y="788" text-anchor="middle">model outputs</text><text class="s" x="337" y="806" text-anchor="middle">for current target</text>
  <path class="arrowG" d="M414 762 L454 762"/>
  <rect class="boxG" x="454" y="714" width="190" height="96"/><text class="t" x="549" y="740" text-anchor="middle" font-weight="800" fill="#117025">3. Wait future 5s</text><text class="t" x="549" y="762" text-anchor="middle" font-weight="800" fill="#117025">and compute</text><text class="s" x="549" y="788" text-anchor="middle">median(t+3,t+4,t+5)</text><text class="s" x="549" y="806" text-anchor="middle">- current</text>
  <path class="arrowG" d="M337 810 L337 852 L240 852"/><path class="arrowR" d="M549 810 L549 852 L474 852"/>
  <rect class="boxG" x="110" y="852" width="224" height="58"/><text class="t" x="222" y="877" text-anchor="middle" font-weight="800" fill="#117025">Inside P10-P90 interval</text><text class="t" x="222" y="900" text-anchor="middle" fill="#117025">Normal</text>
  <rect class="boxR" x="424" y="852" width="224" height="58"/><text class="t" x="536" y="877" text-anchor="middle" font-weight="800" fill="#df1f26">Outside P10-P90 interval</text><text class="t" x="536" y="900" text-anchor="middle" fill="#df1f26">Anomaly / Alert</text>

  <rect class="panel" x="750" y="636" width="1028" height="300"/>
  <text class="h" x="782" y="682">Compact Scope</text>
  <text class="t" x="782" y="724">This vector version keeps the same logic as the detailed poster-style diagram, but removes nonessential explanatory text.</text>
  <text class="t" x="782" y="760">It preserves the measured-delay table, MQTT-to-CSV mapping, target construction, graph structure, model pipeline, rolling context, quantile intervals, and online anomaly rule.</text>
  <text class="t" x="782" y="796">Use this figure when the page needs the whole current method in one clean overview.</text>
</svg>
