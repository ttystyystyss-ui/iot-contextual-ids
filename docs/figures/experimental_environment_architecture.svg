<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #193a7a; stroke-width: 2.2; rx: 18; }
      .zone { fill: #fdfefe; stroke: #b8c6df; stroke-width: 1.6; rx: 16; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 42px; font-weight: 800; fill: #102a63; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #44516b; }
      .h2 { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 800; fill: #102a63; }
      .h3 { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #17233d; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #1c2740; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #44516b; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #536079; }
      .topic { font-family: "Courier New", monospace; font-size: 15px; fill: #24365f; }
      .device { fill: #eef5ff; stroke: #2f67c4; stroke-width: 1.6; rx: 12; }
      .collector { fill: #fff8ec; stroke: #d9831f; stroke-width: 1.6; rx: 12; }
      .control { fill: #eefaf0; stroke: #24823b; stroke-width: 1.6; rx: 12; }
      .ids { fill: #f5efff; stroke: #6738b8; stroke-width: 1.6; rx: 12; }
      .broker { fill: #102a63; stroke: #0a1b42; stroke-width: 2; rx: 18; }
      .brokerText { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 800; fill: #ffffff; }
      .brokerSmall { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #dbe7ff; }
      .arrow { fill: none; stroke: #1d3f82; stroke-width: 3; marker-end: url(#arrowHead); }
      .arrowPub { fill: none; stroke: #d06c00; stroke-width: 3; marker-end: url(#arrowHeadOrange); }
      .arrowSub { fill: none; stroke: #5a2db5; stroke-width: 3; marker-end: url(#arrowHeadPurple); }
      .arrowCtl { fill: none; stroke: #21833a; stroke-width: 3; marker-end: url(#arrowHeadGreen); }
      .dash { stroke-dasharray: 8 7; }
      .badge { fill: #102a63; rx: 9; }
      .badgeText { font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 800; fill: #ffffff; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1d3f82"/>
    </marker>
    <marker id="arrowHeadOrange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#d06c00"/>
    </marker>
    <marker id="arrowHeadPurple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#5a2db5"/>
    </marker>
    <marker id="arrowHeadGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#21833a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <rect class="panel" x="16" y="16" width="1568" height="868"/>

  <text class="title" x="800" y="66" text-anchor="middle">MQTT IoT Contextual IDS Experimental Environment</text>
  <text class="subtitle" x="800" y="96" text-anchor="middle">Physical devices, WSL broker, Python publishers/subscribers, online detection, and alert output</text>

  <rect class="zone" x="42" y="128" width="410" height="640"/>
  <text class="h2" x="70" y="166">1. Physical Bench</text>
  <text class="small" x="70" y="190">real devices on the desk / local Wi-Fi</text>

  <rect class="device" x="72" y="222" width="330" height="86"/>
  <text class="h3" x="95" y="253">Arduino sensor node</text>
  <text class="text" x="95" y="280">DHT / light sensor via serial COM3</text>

  <rect class="device" x="72" y="338" width="330" height="86"/>
  <text class="h3" x="95" y="369">Philips Hue light</text>
  <text class="text" x="95" y="396">state read through local Hue Bridge</text>

  <rect class="device" x="72" y="454" width="330" height="86"/>
  <text class="h3" x="95" y="485">Tapo P110 smart plug</text>
  <text class="text" x="95" y="512">fan power telemetry from plug API</text>

  <rect class="device" x="72" y="570" width="330" height="86"/>
  <text class="h3" x="95" y="601">Dreo fan</text>
  <text class="text" x="95" y="628">fan state via Home Assistant</text>

  <rect class="zone" x="500" y="128" width="390" height="640"/>
  <text class="h2" x="528" y="166">2. Windows Python Layer</text>
  <text class="small" x="528" y="190">collection, control, and online IDS scripts</text>

  <rect class="collector" x="528" y="216" width="320" height="70"/>
  <text class="h3" x="550" y="244">read_arduino.py</text>
  <text class="topic" x="550" y="268">publish iot/arduino</text>

  <rect class="collector" x="528" y="312" width="320" height="70"/>
  <text class="h3" x="550" y="340">philips_hue_to_mqtt.py</text>
  <text class="topic" x="550" y="364">publish iot/light_state</text>

  <rect class="collector" x="528" y="408" width="320" height="70"/>
  <text class="h3" x="550" y="436">tapo_p110_to_mqtt.py</text>
  <text class="topic" x="550" y="460">publish iot/tapo_p110</text>

  <rect class="collector" x="528" y="504" width="320" height="70"/>
  <text class="h3" x="550" y="532">dreo_ha_to_mqtt.py</text>
  <text class="topic" x="550" y="556">publish iot/dreo_fan</text>

  <rect class="control" x="528" y="626" width="320" height="82"/>
  <text class="h3" x="550" y="656">control scripts</text>
  <text class="small" x="550" y="680">hue_control.py / dreo_fan_control.py</text>
  <text class="small" x="550" y="700">scheduled or random state switching</text>

  <rect class="broker" x="954" y="312" width="250" height="164"/>
  <text class="brokerText" x="1079" y="358" text-anchor="middle">WSL MQTT Broker</text>
  <text class="brokerSmall" x="1079" y="390" text-anchor="middle">Mosquitto</text>
  <text class="brokerSmall" x="1079" y="418" text-anchor="middle">172.24.224.223 : 1883</text>
  <text class="brokerSmall" x="1079" y="446" text-anchor="middle">central pub/sub bus</text>

  <rect class="zone" x="1260" y="128" width="300" height="640"/>
  <text class="h2" x="1288" y="166">3. Subscribers</text>
  <text class="small" x="1288" y="190">aligned data and live detection</text>

  <rect class="collector" x="1292" y="238" width="230" height="96"/>
  <text class="h3" x="1312" y="268">collect_all_mqtt.py</text>
  <text class="small" x="1312" y="293">subscribes all telemetry topics</text>
  <text class="small" x="1312" y="315">writes aligned CSV at 1 Hz</text>

  <rect class="ids" x="1292" y="398" width="230" height="118"/>
  <text class="h3" x="1312" y="428">online IDS</text>
  <text class="small" x="1312" y="453">rolling_quantile / multistep</text>
  <text class="small" x="1312" y="475">subscribes live telemetry</text>
  <text class="small" x="1312" y="497">publishes alert topic</text>

  <rect class="control" x="1292" y="586" width="230" height="86"/>
  <text class="h3" x="1312" y="616">outputs</text>
  <text class="small" x="1312" y="640">CSV dataset / online log</text>
  <text class="small" x="1312" y="662">normal or anomaly alert</text>

  <path class="arrow" d="M402 265 C455 265 470 251 528 251"/>
  <path class="arrow" d="M402 381 C455 381 470 347 528 347"/>
  <path class="arrow" d="M402 497 C455 497 470 443 528 443"/>
  <path class="arrow" d="M402 613 C455 613 470 539 528 539"/>

  <path class="arrowPub" d="M848 251 C905 251 913 335 954 354"/>
  <path class="arrowPub" d="M848 347 C905 347 913 370 954 382"/>
  <path class="arrowPub" d="M848 443 C905 443 913 418 954 410"/>
  <path class="arrowPub" d="M848 539 C905 539 913 455 954 438"/>

  <path class="arrowSub" d="M1204 362 C1242 362 1248 286 1292 286"/>
  <path class="arrowSub" d="M1204 426 C1242 426 1248 456 1292 456"/>
  <path class="arrowPub dash" d="M1408 516 C1408 548 1408 554 1408 586"/>

  <path class="arrowCtl" d="M688 626 C688 602 506 428 402 381"/>
  <path class="arrowCtl" d="M720 626 C720 596 506 640 402 613"/>
  <path class="arrowCtl dash" d="M712 708 C712 798 236 792 236 656"/>

  <rect class="badge" x="78" y="796" width="86" height="34"/>
  <text class="badgeText" x="121" y="819" text-anchor="middle">Topics</text>
  <text class="topic" x="184" y="819">iot/arduino, iot/light_state, iot/tapo_p110, iot/dreo_fan, iot/rolling_quantile_gnn_gru_ids_alert</text>

  <rect class="badge" x="78" y="838" width="86" height="34"/>
  <text class="badgeText" x="121" y="861" text-anchor="middle">Scope</text>
  <text class="small" x="184" y="861">Diagram shows the deployed experimental environment, not the internal GAT-GRU training architecture.</text>
</svg>
