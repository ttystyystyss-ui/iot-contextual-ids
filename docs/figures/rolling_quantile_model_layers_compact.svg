<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <style>
      .bg{fill:#f8fafc}.page{fill:#fff;stroke:#102a63;stroke-width:2.2;rx:18}.stage{fill:#fff;stroke-width:1.7;rx:14}.b{stroke:#2864c8}.o{stroke:#e17a18}.g{stroke:#207a34}.p{stroke:#6038b8}.r{stroke:#d21e22}
      .title{font-family:Arial,Helvetica,sans-serif;font-size:43px;font-weight:800;fill:#102a63}.sub{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#52617a}
      .h{font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:800;fill:#102a63}.ho{font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:800;fill:#9a4b00}.hg{font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:800;fill:#136626}.hp{font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:800;fill:#3f1b88}.hr{font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:800;fill:#b31518}
      .t{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#17233d}.s{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#52617a}.m{font-family:"Courier New",monospace;font-size:13px;fill:#17233d}.f{font-family:"Times New Roman",serif;font-size:21px;fill:#17233d;font-style:italic}
      .box{fill:#fff;stroke:#b8c6df;stroke-width:1.1;rx:8}.bb{fill:#f1f6ff;stroke:#2864c8;stroke-width:1.35;rx:8}.bo{fill:#fff7ed;stroke:#e17a18;stroke-width:1.35;rx:8}.bg2{fill:#eefaf0;stroke:#207a34;stroke-width:1.35;rx:8}.bp{fill:#f5efff;stroke:#6038b8;stroke-width:1.35;rx:8}.br{fill:#fff3f3;stroke:#d21e22;stroke-width:1.35;rx:8}
      .arr{fill:none;stroke:#102a63;stroke-width:4;marker-end:url(#a)}.edge{fill:none;stroke:#111;stroke-width:2;marker-end:url(#ab)}.dash{stroke-dasharray:6 6}.nodeT{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:800;fill:#102a63}
      .vl{fill:#bdeac2;stroke:#207a34}.vf{fill:#cfe0ff;stroke:#2864c8}.va{fill:#ffd6ad;stroke:#e17a18}.vp{fill:#decfff;stroke:#6038b8}.bt{font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:800;fill:#102a63}
    </style>
    <marker id="a" markerWidth="11" markerHeight="9" refX="10" refY="4.5" orient="auto"><path d="M0,0 L11,4.5 L0,9 Z" fill="#102a63"/></marker>
    <marker id="ab" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#111"/></marker>
  </defs>
  <rect class="bg" width="1800" height="980"/><rect class="page" x="18" y="18" width="1764" height="944"/>
  <text class="title" x="900" y="66" text-anchor="middle">Model Layers - Rolling Quantile GAT-GRU</text>
  <text class="sub" x="900" y="96" text-anchor="middle">Simplified vector diagram with complete data flow, key dimensions, context feature, and quantile output logic</text>

  <rect class="stage b" x="40" y="130" width="195" height="548"/><text class="h" x="62" y="166">1. Input</text>
  <text class="t" x="138" y="205" text-anchor="middle">10 time steps</text><text class="s" x="138" y="228" text-anchor="middle">4 nodes, 4 features</text>
  <rect class="bb" x="66" y="256" width="144" height="160"/>
  <circle cx="102" cy="302" r="21" class="vl"/><text class="nodeT" x="102" y="310" text-anchor="middle">L</text><circle cx="174" cy="302" r="21" class="va"/><text class="nodeT" x="174" y="310" text-anchor="middle">A</text>
  <circle cx="102" cy="374" r="21" class="vf"/><text class="nodeT" x="102" y="382" text-anchor="middle">F</text><circle cx="174" cy="374" r="21" class="vp"/><text class="nodeT" x="174" y="382" text-anchor="middle">P</text>
  <path class="edge" d="M123 302 L153 302"/><path class="edge" d="M118 318 L158 358"/><path class="edge" d="M123 374 L153 374"/>
  <rect class="box" x="66" y="456" width="144" height="54"/><text class="m" x="138" y="478" text-anchor="middle">value, delta</text><text class="m" x="138" y="498" text-anchor="middle">age, node_type</text>
  <text class="f" x="138" y="590" text-anchor="middle">X in R<tspan baseline-shift="super" font-size="13">10 x 4 x 4</tspan></text>
  <path class="arr" d="M235 404 L266 404"/>

  <rect class="stage o" x="266" y="130" width="220" height="548"/><text class="ho" x="288" y="166">2. GAT Spatial</text>
  <text class="s" x="376" y="204" text-anchor="middle">one graph per second</text>
  <circle cx="326" cy="276" r="21" class="vl"/><text class="nodeT" x="326" y="284" text-anchor="middle">L</text><circle cx="426" cy="276" r="21" class="va"/><text class="nodeT" x="426" y="284" text-anchor="middle">A</text>
  <circle cx="326" cy="354" r="21" class="vf"/><text class="nodeT" x="326" y="362" text-anchor="middle">F</text><circle cx="426" cy="354" r="21" class="vp"/><text class="nodeT" x="426" y="362" text-anchor="middle">P</text>
  <path class="edge" d="M347 276 L405 276"/><path class="edge" d="M342 292 L410 338"/><path class="edge" d="M347 354 L405 354"/><path class="edge dash" d="M448 276 L448 334"/>
  <text class="s" x="296" y="432">Linear(4 -> 16) node projection</text><text class="s" x="296" y="460">attention: concat 32 -> 1</text><text class="s" x="296" y="488">softmax over incoming edges</text><text class="s" x="296" y="516">directed edges + self-loops</text>
  <rect class="bo" x="308" y="558" width="136" height="64"/><text class="f" x="376" y="596" text-anchor="middle">R<tspan baseline-shift="super" font-size="13">4 x 16</tspan></text>
  <path class="arr" d="M486 404 L517 404"/>

  <rect class="stage g" x="517" y="130" width="178" height="548"/><text class="hg" x="539" y="166">3. Projector</text>
  <text class="s" x="606" y="204" text-anchor="middle">shared node MLP</text>
  <rect class="bg2" x="552" y="252" width="108" height="42"/><text class="t" x="606" y="279" text-anchor="middle">ReLU</text><path class="edge" d="M606 294 L606 326"/>
  <rect class="bg2" x="552" y="326" width="108" height="42"/><text class="t" x="606" y="353" text-anchor="middle">Linear 16 -> 16</text><path class="edge" d="M606 368 L606 400"/>
  <rect class="bg2" x="552" y="400" width="108" height="42"/><text class="t" x="606" y="427" text-anchor="middle">ReLU</text>
  <rect class="bg2" x="542" y="558" width="128" height="64"/><text class="f" x="606" y="596" text-anchor="middle">R<tspan baseline-shift="super" font-size="13">4 x 16</tspan></text>
  <path class="arr" d="M695 404 L726 404"/>

  <rect class="stage b" x="726" y="130" width="196" height="548"/><text class="h" x="748" y="166">4. Flatten</text>
  <text class="s" x="824" y="204" text-anchor="middle">4 node embeddings</text>
  <rect class="vl" x="778" y="260" width="92" height="20"/><rect class="va" x="778" y="312" width="92" height="20"/><rect class="vf" x="778" y="364" width="92" height="20"/><rect class="vp" x="778" y="416" width="92" height="20"/>
  <text class="s" x="884" y="276">16</text><text class="s" x="884" y="328">16</text><text class="s" x="884" y="380">16</text><text class="s" x="884" y="432">16</text>
  <path class="edge" d="M824 448 L824 496"/><rect class="vl" x="760" y="510" width="36" height="18"/><rect class="va" x="796" y="510" width="36" height="18"/><rect class="vf" x="832" y="510" width="36" height="18"/><rect class="vp" x="868" y="510" width="36" height="18"/>
  <text class="f" x="824" y="590" text-anchor="middle">Z in R<tspan baseline-shift="super" font-size="13">10 x 64</tspan></text>
  <text class="s" x="824" y="622" text-anchor="middle">4 x 16 = 64 per second</text>
  <path class="arr" d="M922 404 L953 404"/>

  <rect class="stage p" x="953" y="130" width="244" height="548"/><text class="hp" x="975" y="166">5. GRU Temporal Encoder</text>
  <text class="s" x="1075" y="204" text-anchor="middle">input 64, hidden 64, 1 layer</text>
  <rect class="bp" x="1018" y="270" width="52" height="34"/><text class="t" x="1044" y="293" text-anchor="middle">GRU</text><rect class="bp" x="1110" y="270" width="52" height="34"/><text class="t" x="1136" y="293" text-anchor="middle">GRU</text><path class="edge" d="M1070 287 L1110 287"/>
  <rect class="bp" x="1018" y="350" width="52" height="34"/><text class="t" x="1044" y="373" text-anchor="middle">GRU</text><rect class="bp" x="1110" y="350" width="52" height="34"/><text class="t" x="1136" y="373" text-anchor="middle">GRU</text><path class="edge" d="M1070 367 L1110 367"/>
  <text class="s" x="1026" y="440">...</text>
  <rect class="bp" x="1018" y="470" width="52" height="34"/><text class="t" x="1044" y="493" text-anchor="middle">GRU</text><rect class="bp" x="1110" y="470" width="52" height="34"/><text class="t" x="1136" y="493" text-anchor="middle">GRU</text><path class="edge" d="M1070 487 L1110 487"/>
  <rect class="vp" x="1020" y="548" width="110" height="20"/><text class="f" x="1075" y="612" text-anchor="middle">h<tspan baseline-shift="sub" font-size="13">t</tspan> in R<tspan baseline-shift="super" font-size="13">64</tspan></text>
  <path class="arr" d="M1197 404 L1228 404"/>

  <rect class="stage r" x="1228" y="130" width="164" height="548"/><text class="hr" x="1250" y="166">6. Context</text>
  <text class="s" x="1310" y="204" text-anchor="middle">rolling scalar</text>
  <rect class="br" x="1254" y="238" width="112" height="56"/><text class="m" x="1310" y="262" text-anchor="middle">last_off</text><text class="m" x="1310" y="282" text-anchor="middle">ambient_median</text>
  <path class="edge" d="M1310 294 L1310 454"/><rect class="vp" x="1262" y="510" width="88" height="20"/><rect class="br" x="1356" y="506" width="18" height="28"/>
  <text class="s" x="1310" y="570" text-anchor="middle">concat [h_t ; context]</text><text class="f" x="1310" y="612" text-anchor="middle">R<tspan baseline-shift="super" font-size="13">65</tspan></text>
  <path class="arr" d="M1392 404 L1423 404"/>

  <rect class="stage o" x="1423" y="130" width="196" height="548"/><text class="ho" x="1445" y="166">7. Quantile Head</text>
  <rect class="bo" x="1458" y="230" width="126" height="38"/><text class="t" x="1521" y="255" text-anchor="middle">Linear 65 -> 64</text><path class="edge" d="M1521 268 L1521 300"/>
  <rect class="bo" x="1458" y="300" width="126" height="38"/><text class="t" x="1521" y="325" text-anchor="middle">ReLU</text><path class="edge" d="M1521 338 L1521 370"/>
  <rect class="bo" x="1458" y="370" width="126" height="38"/><text class="t" x="1521" y="395" text-anchor="middle">Dropout 0.3</text><path class="edge" d="M1521 408 L1521 440"/>
  <rect class="bo" x="1458" y="440" width="126" height="38"/><text class="t" x="1521" y="465" text-anchor="middle">Linear 64 -> 6</text>
  <rect class="bo" x="1446" y="522" width="150" height="106"/><text class="s" x="1521" y="548" text-anchor="middle">monotonic transform</text><text class="s" x="1521" y="574" text-anchor="middle">P10 = c - softplus(wL)</text><text class="s" x="1521" y="598" text-anchor="middle">P50 = c</text><text class="s" x="1521" y="622" text-anchor="middle">P90 = c + softplus(wH)</text>
  <path class="arr" d="M1619 404 L1650 404"/>

  <rect class="stage b" x="1650" y="130" width="124" height="548"/><text class="h" x="1672" y="166">8. Output</text>
  <rect class="bo" x="1668" y="236" width="88" height="110"/><text class="t" x="1712" y="266" text-anchor="middle">ambient</text><text class="m" x="1712" y="296" text-anchor="middle">P10 P50 P90</text>
  <rect class="bp" x="1668" y="390" width="88" height="110"/><text class="t" x="1712" y="420" text-anchor="middle">power</text><text class="m" x="1712" y="450" text-anchor="middle">P10 P50 P90</text>
  <text class="s" x="1712" y="560" text-anchor="middle">response = median</text><text class="s" x="1712" y="582" text-anchor="middle">(t+3,t+4,t+5)</text><text class="s" x="1712" y="604" text-anchor="middle">- current</text>

  <rect class="bb" x="40" y="720" width="1720" height="180"/>
  <text class="bt" x="78" y="758">Graph</text><text class="t" x="78" y="792">Nodes: L light_state, F fan_state, A ambient_light, P total_power_w.</text><text class="t" x="78" y="824">Edges: L -> A, L -> P, F -> P, plus self-loops.</text>
  <text class="bt" x="600" y="758">Target and Context</text><text class="t" x="600" y="792">Past: 10s input window at 1s resolution.</text><text class="t" x="600" y="824">Future: response = median(t+3,t+4,t+5) - current; skip future state transitions.</text><text class="t" x="600" y="856">Context: last_off_ambient_median is concatenated with GRU hidden state.</text>
  <text class="bt" x="1270" y="758">Dimensions</text><text class="t" x="1270" y="792">Input R^10x4x4 -> GAT/projector R^4x16 per step.</text><text class="t" x="1270" y="824">Flatten R^10x64 -> GRU h_t R^64 -> context concat R^65.</text><text class="t" x="1270" y="856">Quantile output R^6 = 2 variables x 3 quantiles.</text>
  <text class="sub" x="900" y="938" text-anchor="middle">Current model excludes temperature; temperature remains in delay analysis and future work.</text>
</svg>
