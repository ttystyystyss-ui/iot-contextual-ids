<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1050" viewBox="0 0 1900 1050">
  <defs>
    <style>
      .page{fill:#fff;stroke:#0b2b6f;stroke-width:2.4;rx:14}
      .title{font-family:Arial,Helvetica,sans-serif;font-size:44px;font-weight:800;fill:#0b2b6f}
      .card{fill:#fff;stroke-width:1.7;rx:10}.b{stroke:#1f55bd}.o{stroke:#f06c00}.g{stroke:#1d7a34}.p{stroke:#6b39c8}.r{stroke:#df1f26}
      .badge{rx:15}.badgeText{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:800;fill:white}
      .h{font-family:Arial,Helvetica,sans-serif;font-size:19px;font-weight:800;fill:#0b2b6f}.ho{font-family:Arial,Helvetica,sans-serif;font-size:19px;font-weight:800;fill:#a14b00}.hg{font-family:Arial,Helvetica,sans-serif;font-size:19px;font-weight:800;fill:#117025}.hp{font-family:Arial,Helvetica,sans-serif;font-size:19px;font-weight:800;fill:#3f1b88}.hr{font-family:Arial,Helvetica,sans-serif;font-size:19px;font-weight:800;fill:#b31518}
      .t{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#111827}.s{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#374151}.m{font-family:"Courier New",monospace;font-size:13px;fill:#111827}.f{font-family:"Times New Roman",serif;font-size:22px;fill:#111827;font-style:italic}
      .box{fill:#fff;stroke:#9fb0cf;stroke-width:1.1;rx:7}.boxB{fill:#f8fbff;stroke:#1f55bd;stroke-width:1.3;rx:7}.boxO{fill:#fffaf4;stroke:#f06c00;stroke-width:1.3;rx:7}.boxG{fill:#fbfffc;stroke:#1d7a34;stroke-width:1.3;rx:7}.boxP{fill:#fbf8ff;stroke:#6b39c8;stroke-width:1.3;rx:7}.boxR{fill:#fffafa;stroke:#df1f26;stroke-width:1.3;rx:7}
      .arr{fill:none;stroke:#0b2b6f;stroke-width:4;marker-end:url(#arrow)}.edge{fill:none;stroke:#111;stroke-width:2;marker-end:url(#arrowBlack)}.dash{stroke-dasharray:6 5}
      .nodeT{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:800;fill:#0b2b6f}
      .vl{fill:#c9f2ce;stroke:#1d7a34}.vf{fill:#cfe0ff;stroke:#1f55bd}.va{fill:#ffd9b8;stroke:#f06c00}.vp{fill:#decfff;stroke:#6b39c8}
      .strip{fill:#fff;stroke:#17449d;stroke-width:1.6;rx:10}.stripHead{font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:800;fill:#0b2b6f}
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="9" refX="10" refY="4.5" orient="auto"><path d="M0,0 L11,4.5 L0,9 Z" fill="#0b2b6f"/></marker>
    <marker id="arrowBlack" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#111"/></marker>
  </defs>

  <rect class="page" x="8" y="8" width="1884" height="1034"/>
  <text class="title" x="950" y="62" text-anchor="middle">Model Layers - Rolling Quantile GAT-GRU</text>

  <!-- Cards -->
  <rect class="card b" x="28" y="102" width="238" height="650"/><circle class="badge" cx="58" cy="132" r="18" fill="#0b4da2"/><text class="badgeText" x="58" y="139" text-anchor="middle">1</text><text class="h" x="86" y="140">Input Sequence</text>
  <text class="t" x="147" y="186" text-anchor="middle" font-weight="800">10 time steps</text>
  <rect class="boxB" x="64" y="220" width="166" height="190"/>
  <text class="s" x="147" y="246" text-anchor="middle">t = t-9 ... t</text>
  <circle cx="104" cy="294" r="22" class="vl"/><text class="nodeT" x="104" y="302" text-anchor="middle">L</text><circle cx="190" cy="294" r="22" class="va"/><text class="nodeT" x="190" y="302" text-anchor="middle">A</text>
  <circle cx="104" cy="370" r="22" class="vf"/><text class="nodeT" x="104" y="378" text-anchor="middle">F</text><circle cx="190" cy="370" r="22" class="vp"/><text class="nodeT" x="190" y="378" text-anchor="middle">P</text>
  <path class="edge" d="M126 294 L168 294"/><path class="edge" d="M120 312 L174 352"/><path class="edge" d="M126 370 L168 370"/>
  <text class="t" x="147" y="452" text-anchor="middle" font-weight="800">Node features</text>
  <rect class="box" x="58" y="474" width="178" height="42"/><text class="m" x="147" y="500" text-anchor="middle">value, delta, age, type</text>
  <rect class="boxB" x="58" y="584" width="178" height="72"/><text class="s" x="147" y="612" text-anchor="middle">Input tensor</text><text class="f" x="147" y="640" text-anchor="middle">X in R<tspan baseline-shift="super" font-size="13">10 x 4 x 4</tspan></text>

  <path class="arr" d="M266 427 L296 427"/>
  <rect class="card o" x="296" y="102" width="252" height="650"/><circle class="badge" cx="326" cy="132" r="18" fill="#c56000"/><text class="badgeText" x="326" y="139" text-anchor="middle">2</text><text class="ho" x="354" y="140">GAT Spatial Layer</text>
  <text class="t" x="422" y="186" text-anchor="middle">Process one time-step graph</text>
  <circle cx="370" cy="270" r="22" class="vl"/><text class="nodeT" x="370" y="278" text-anchor="middle">L</text><circle cx="480" cy="270" r="22" class="va"/><text class="nodeT" x="480" y="278" text-anchor="middle">A</text>
  <circle cx="370" cy="356" r="22" class="vf"/><text class="nodeT" x="370" y="364" text-anchor="middle">F</text><circle cx="480" cy="356" r="22" class="vp"/><text class="nodeT" x="480" y="364" text-anchor="middle">P</text>
  <path class="edge" d="M392 270 L458 270"/><path class="edge" d="M388 288 L462 338"/><path class="edge" d="M392 356 L458 356"/><path class="edge dash" d="M503 270 L503 334"/>
  <text class="s" x="330" y="448">Node projection: Linear(4 -> 16)</text><text class="s" x="330" y="476">Attention: concat dim 32 -> 1</text><text class="s" x="330" y="504">Softmax over incoming edges</text><text class="s" x="330" y="532">Weighted aggregation + self-loops</text>
  <rect class="boxO" x="342" y="600" width="160" height="72"/><text class="s" x="422" y="628" text-anchor="middle">Output per step</text><text class="f" x="422" y="656" text-anchor="middle">H<tspan baseline-shift="super" font-size="13">gat</tspan> in R<tspan baseline-shift="super" font-size="13">4 x 16</tspan></text>

  <path class="arr" d="M548 427 L578 427"/>
  <rect class="card g" x="578" y="102" width="196" height="650"/><circle class="badge" cx="608" cy="132" r="18" fill="#177236"/><text class="badgeText" x="608" y="139" text-anchor="middle">3</text><text class="hg" x="636" y="140">Node Projector</text>
  <text class="s" x="676" y="198" text-anchor="middle">MLP shared across nodes</text>
  <rect class="boxG" x="624" y="250" width="104" height="42"/><text class="t" x="676" y="277" text-anchor="middle">ReLU</text><path class="edge" d="M676 292 L676 330"/>
  <rect class="boxG" x="614" y="330" width="124" height="42"/><text class="t" x="676" y="357" text-anchor="middle">Linear(16 -> 16)</text><path class="edge" d="M676 372 L676 410"/>
  <rect class="boxG" x="624" y="410" width="104" height="42"/><text class="t" x="676" y="437" text-anchor="middle">ReLU</text>
  <rect class="boxG" x="612" y="600" width="128" height="72"/><text class="s" x="676" y="628" text-anchor="middle">Output per step</text><text class="f" x="676" y="656" text-anchor="middle">R<tspan baseline-shift="super" font-size="13">4 x 16</tspan></text>

  <path class="arr" d="M774 427 L804 427"/>
  <rect class="card b" x="804" y="102" width="226" height="650"/><circle class="badge" cx="834" cy="132" r="18" fill="#0b4da2"/><text class="badgeText" x="834" y="139" text-anchor="middle">4</text><text class="h" x="862" y="140">Flatten Nodes</text>
  <text class="t" x="917" y="190" text-anchor="middle">4 node embeddings</text>
  <text class="s" x="917" y="214" text-anchor="middle">by concatenation</text>
  <rect class="vl" x="862" y="270" width="92" height="18"/><text class="s" x="966" y="285">16</text><rect class="va" x="862" y="324" width="92" height="18"/><text class="s" x="966" y="339">16</text><rect class="vf" x="862" y="378" width="92" height="18"/><text class="s" x="966" y="393">16</text><rect class="vp" x="862" y="432" width="92" height="18"/><text class="s" x="966" y="447">16</text>
  <path class="edge" d="M908 462 L908 512"/><rect class="vl" x="842" y="528" width="40" height="18"/><rect class="va" x="882" y="528" width="40" height="18"/><rect class="vf" x="922" y="528" width="40" height="18"/><rect class="vp" x="962" y="528" width="40" height="18"/>
  <rect class="boxB" x="842" y="600" width="150" height="72"/><text class="s" x="917" y="628" text-anchor="middle">Sequence tensor</text><text class="f" x="917" y="656" text-anchor="middle">Z in R<tspan baseline-shift="super" font-size="13">10 x 64</tspan></text>

  <path class="arr" d="M1030 427 L1060 427"/>
  <rect class="card p" x="1060" y="102" width="254" height="650"/><circle class="badge" cx="1090" cy="132" r="18" fill="#4b1f9f"/><text class="badgeText" x="1090" y="139" text-anchor="middle">5</text><text class="hp" x="1118" y="140">GRU Temporal Encoder</text>
  <text class="s" x="1187" y="190" text-anchor="middle">GRU(input=64, hidden=64, layers=1)</text>
  <rect class="boxP" x="1128" y="270" width="54" height="34"/><text class="t" x="1155" y="293" text-anchor="middle">GRU</text><rect class="boxP" x="1214" y="270" width="54" height="34"/><text class="t" x="1241" y="293" text-anchor="middle">GRU</text><path class="edge" d="M1182 287 L1214 287"/>
  <rect class="boxP" x="1128" y="360" width="54" height="34"/><text class="t" x="1155" y="383" text-anchor="middle">GRU</text><rect class="boxP" x="1214" y="360" width="54" height="34"/><text class="t" x="1241" y="383" text-anchor="middle">GRU</text><path class="edge" d="M1182 377 L1214 377"/>
  <text class="s" x="1138" y="456">...</text>
  <rect class="boxP" x="1128" y="500" width="54" height="34"/><text class="t" x="1155" y="523" text-anchor="middle">GRU</text><rect class="boxP" x="1214" y="500" width="54" height="34"/><text class="t" x="1241" y="523" text-anchor="middle">GRU</text><path class="edge" d="M1182 517 L1214 517"/>
  <rect class="vp" x="1130" y="590" width="118" height="22"/><text class="f" x="1187" y="660" text-anchor="middle">h<tspan baseline-shift="sub" font-size="13">t</tspan> in R<tspan baseline-shift="super" font-size="13">64</tspan></text>

  <path class="arr" d="M1314 427 L1344 427"/>
  <rect class="card r" x="1344" y="102" width="166" height="650"/><circle class="badge" cx="1374" cy="132" r="18" fill="#c92323"/><text class="badgeText" x="1374" y="139" text-anchor="middle">6</text><text class="hr" x="1402" y="140">Context Concat</text>
  <text class="s" x="1427" y="204" text-anchor="middle">Context scalar</text>
  <rect class="boxR" x="1374" y="236" width="106" height="56"/><text class="m" x="1427" y="260" text-anchor="middle">last_off</text><text class="m" x="1427" y="280" text-anchor="middle">ambient</text>
  <path class="edge" d="M1427 292 L1427 484"/>
  <rect class="vp" x="1378" y="540" width="82" height="20"/><rect class="boxR" x="1468" y="536" width="18" height="28"/>
  <rect class="box" x="1368" y="604" width="118" height="52"/><text class="s" x="1427" y="626" text-anchor="middle">[h_t ; context]</text><text class="f" x="1427" y="648" text-anchor="middle">R<tspan baseline-shift="super" font-size="13">65</tspan></text>

  <path class="arr" d="M1510 427 L1540 427"/>
  <rect class="card o" x="1540" y="102" width="190" height="650"/><circle class="badge" cx="1570" cy="132" r="18" fill="#c56000"/><text class="badgeText" x="1570" y="139" text-anchor="middle">7</text><text class="ho" x="1598" y="140">Quantile Head</text>
  <rect class="boxO" x="1572" y="224" width="126" height="38"/><text class="t" x="1635" y="249" text-anchor="middle">Linear(65 -> 64)</text><path class="edge" d="M1635 262 L1635 294"/>
  <rect class="boxO" x="1572" y="294" width="126" height="38"/><text class="t" x="1635" y="319" text-anchor="middle">ReLU</text><path class="edge" d="M1635 332 L1635 364"/>
  <rect class="boxO" x="1572" y="364" width="126" height="38"/><text class="t" x="1635" y="389" text-anchor="middle">Dropout(0.3)</text><path class="edge" d="M1635 402 L1635 434"/>
  <rect class="boxO" x="1572" y="434" width="126" height="38"/><text class="t" x="1635" y="459" text-anchor="middle">Linear(64 -> 6)</text>
  <rect class="boxO" x="1562" y="534" width="146" height="120"/><text class="s" x="1635" y="558" text-anchor="middle" font-weight="800">Monotonic transform</text><text class="s" x="1635" y="586" text-anchor="middle">P10 = c - softplus(wL)</text><text class="s" x="1635" y="610" text-anchor="middle">P50 = c</text><text class="s" x="1635" y="634" text-anchor="middle">P90 = c + softplus(wH)</text>

  <path class="arr" d="M1730 427 L1760 427"/>
  <rect class="card b" x="1760" y="102" width="112" height="650"/><circle class="badge" cx="1790" cy="132" r="18" fill="#0b4da2"/><text class="badgeText" x="1790" y="139" text-anchor="middle">8</text><text class="h" x="1818" y="140">Output</text>
  <rect class="boxO" x="1778" y="250" width="76" height="120"/><text class="s" x="1816" y="280" text-anchor="middle" fill="#d95d00">ambient</text><text class="m" x="1816" y="312" text-anchor="middle">P10</text><text class="m" x="1816" y="338" text-anchor="middle">P50</text><text class="m" x="1816" y="364" text-anchor="middle">P90</text>
  <rect class="boxP" x="1778" y="424" width="76" height="120"/><text class="s" x="1816" y="454" text-anchor="middle" fill="#3f1b88">power</text><text class="m" x="1816" y="486" text-anchor="middle">P10</text><text class="m" x="1816" y="512" text-anchor="middle">P50</text><text class="m" x="1816" y="538" text-anchor="middle">P90</text>
  <text class="s" x="1816" y="610" text-anchor="middle">2 variables</text><text class="s" x="1816" y="632" text-anchor="middle">x 3 quantiles</text>

  <!-- Bottom strip -->
  <rect class="strip" x="28" y="786" width="1844" height="190"/>
  <text class="stripHead" x="64" y="826">Graph Structure</text>
  <text class="t" x="64" y="858">Nodes: L light_state, F fan_state, A ambient_light, P total_power_w.</text>
  <text class="t" x="64" y="888">Edges: L -> A, L -> P, F -> P, plus self-loops on all nodes.</text>
  <text class="stripHead" x="630" y="826">Target and Window</text>
  <text class="t" x="630" y="858">Past input: 10s window at 1s resolution, from t-9 to t.</text>
  <text class="t" x="630" y="888">Response target: median(t+3,t+4,t+5) - current; skip future state transitions.</text>
  <text class="stripHead" x="1260" y="826">Dimension Summary</text>
  <text class="t" x="1260" y="858">Input R^10x4x4 -> flattened sequence R^10x64.</text>
  <text class="t" x="1260" y="888">GRU hidden R^64 -> context concat R^65 -> quantile output R^6.</text>
  <text class="s" x="950" y="944" text-anchor="middle">Self-review note: temperature is excluded from the current model and remains in future work.</text>
</svg>
