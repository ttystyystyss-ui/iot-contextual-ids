<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 800; fill: #102a63; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #52617a; }
      .axis { stroke: #162447; stroke-width: 2; }
      .grid { stroke: #d8e0ef; stroke-width: 1; }
      .tick { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #52617a; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #24314f; }
      .ambient { fill: none; stroke: #145dff; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .power { fill: none; stroke: #e21c2d; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .note { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #52617a; }
      .legendText { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #24314f; }
      .box { fill: #f7f9fc; stroke: #b8c6df; stroke-width: 1.2; rx: 8; }
      .blueText { fill: #145dff; }
      .redText { fill: #e21c2d; }
    </style>
