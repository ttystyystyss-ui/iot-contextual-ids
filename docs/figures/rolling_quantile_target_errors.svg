<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 800; fill: #102a63; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #52617a; }
      .panelTitle { font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 800; fill: #102a63; }
      .axis { stroke: #162447; stroke-width: 2; }
      .grid { stroke: #d8e0ef; stroke-width: 1; }
      .tick { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #52617a; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #24314f; }
      .train { fill: none; stroke: #145dff; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .val { fill: none; stroke: #e21c2d; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .note { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #52617a; }
      .legendText { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #24314f; }
      .box { fill: #f7f9fc; stroke: #b8c6df; stroke-width: 1.2; rx: 8; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="600" y="52" text-anchor="middle">Rolling Quantile Target Mean Errors</text>
  <text class="subtitle" x="600" y="78" text-anchor="middle">Ambient-light and total-power errors over 120 epochs; each panel uses its own y-axis scale</text>

  <!-- Left panel: ambient_light -->
  <text class="panelTitle" x="330" y="118" text-anchor="middle">ambient_light</text>
  <line class="grid" x1="100" y1="150" x2="560" y2="150"/>
  <line class="grid" x1="100" y1="225" x2="560" y2="225"/>
  <line class="grid" x1="100" y1="300" x2="560" y2="300"/>
  <line class="grid" x1="100" y1="375" x2="560" y2="375"/>
  <line class="grid" x1="100" y1="450" x2="560" y2="450"/>
  <line class="grid" x1="100" y1="525" x2="560" y2="525"/>
  <line class="grid" x1="100" y1="150" x2="100" y2="525"/>
  <line class="grid" x1="255" y1="150" x2="255" y2="525"/>
  <line class="grid" x1="410" y1="150" x2="410" y2="525"/>
  <line class="grid" x1="560" y1="150" x2="560" y2="525"/>
  <line class="axis" x1="100" y1="525" x2="560" y2="525"/>
  <line class="axis" x1="100" y1="150" x2="100" y2="525"/>
  <text class="tick" x="84" y="154" text-anchor="end">1.00</text>
  <text class="tick" x="84" y="229" text-anchor="end">0.80</text>
  <text class="tick" x="84" y="304" text-anchor="end">0.60</text>
  <text class="tick" x="84" y="379" text-anchor="end">0.40</text>
  <text class="tick" x="84" y="454" text-anchor="end">0.20</text>
  <text class="tick" x="84" y="529" text-anchor="end">0.00</text>
  <text class="tick" x="100" y="550" text-anchor="middle">1</text>
  <text class="tick" x="255" y="550" text-anchor="middle">40</text>
  <text class="tick" x="410" y="550" text-anchor="middle">80</text>
  <text class="tick" x="560" y="550" text-anchor="middle">120</text>

  <polyline class="train" points="
    100,150.9 103.9,223.3 107.8,314.3 111.7,402.7 115.5,417.6
    119.4,431.7 123.3,448.6 127.2,475.4 135.0,505.8 173.8,519.1
    216.5,519.1 255.3,519.2 294.0,519.2 332.8,519.2 371.5,519.2
    410.2,519.2 449.0,519.3 487.8,519.3 526.5,519.2 560.0,519.0"/>

  <polyline class="val" points="
    100,515.5 103.9,521.9 107.8,523.4 115.5,524.0 135.0,524.6
    173.8,524.4 216.5,524.3 255.3,524.5 294.0,524.6 332.8,524.7
    371.5,524.6 410.2,524.6 449.0,524.7 487.8,524.6 526.5,524.5 560.0,524.1"/>

  <text class="label" x="330" y="588" text-anchor="middle">Epoch</text>
  <text class="label" x="35" y="338" text-anchor="middle" transform="rotate(-90 35 338)">Mean error</text>

  <!-- Right panel: total_power_w -->
  <text class="panelTitle" x="870" y="118" text-anchor="middle">total_power_w</text>
  <line class="grid" x1="640" y1="150" x2="1100" y2="150"/>
  <line class="grid" x1="640" y1="225" x2="1100" y2="225"/>
  <line class="grid" x1="640" y1="300" x2="1100" y2="300"/>
  <line class="grid" x1="640" y1="375" x2="1100" y2="375"/>
  <line class="grid" x1="640" y1="450" x2="1100" y2="450"/>
  <line class="grid" x1="640" y1="525" x2="1100" y2="525"/>
  <line class="grid" x1="640" y1="150" x2="640" y2="525"/>
  <line class="grid" x1="795" y1="150" x2="795" y2="525"/>
  <line class="grid" x1="950" y1="150" x2="950" y2="525"/>
  <line class="grid" x1="1100" y1="150" x2="1100" y2="525"/>
  <line class="axis" x1="640" y1="525" x2="1100" y2="525"/>
  <line class="axis" x1="640" y1="150" x2="640" y2="525"/>
  <text class="tick" x="624" y="154" text-anchor="end">1.20</text>
  <text class="tick" x="624" y="229" text-anchor="end">0.96</text>
  <text class="tick" x="624" y="304" text-anchor="end">0.72</text>
  <text class="tick" x="624" y="379" text-anchor="end">0.48</text>
  <text class="tick" x="624" y="454" text-anchor="end">0.24</text>
  <text class="tick" x="624" y="529" text-anchor="end">0.00</text>
  <text class="tick" x="640" y="550" text-anchor="middle">1</text>
  <text class="tick" x="795" y="550" text-anchor="middle">40</text>
  <text class="tick" x="950" y="550" text-anchor="middle">80</text>
  <text class="tick" x="1100" y="550" text-anchor="middle">120</text>

  <polyline class="train" points="
    640,220.8 643.9,297.0 647.8,507.7 651.7,514.6 655.5,516.7
    659.4,516.8 663.3,518.0 667.2,518.3 675.0,518.7 713.8,519.9
    756.5,520.2 795.3,520.3 834.0,520.3 872.8,520.3 911.5,520.4
    950.2,520.4 989.0,520.4 1027.8,520.4 1066.5,520.4 1100.0,520.4"/>

  <polyline class="val" points="
    640,153.3 643.9,240.4 647.8,491.3 651.7,498.1 655.5,498.8
    659.4,497.6 663.3,498.9 667.2,499.3 675.0,500.3 713.8,501.9
    756.5,501.2 795.3,501.1 834.0,500.3 872.8,500.9 911.5,500.1
    950.2,500.6 989.0,500.4 1027.8,501.0 1066.5,501.6 1100.0,501.7"/>

  <text class="label" x="870" y="588" text-anchor="middle">Epoch</text>
  <text class="label" x="575" y="338" text-anchor="middle" transform="rotate(-90 575 338)">Mean error</text>

  <rect class="box" x="470" y="104" width="260" height="38"/>
  <line class="train" x1="492" y1="123" x2="536" y2="123"/>
  <text class="legendText" x="548" y="128">train target mean error</text>
  <line class="val" x1="492" y1="138" x2="536" y2="138" transform="translate(0,0)"/>
  <text class="legendText" x="548" y="143">validation target mean error</text>

  <text class="note" x="600" y="606" text-anchor="middle">The validation power error dominates; ambient-light validation error remains close to zero after early epochs.</text>
</svg>
